<!-- Modal Backdrop -->
<div class="modal-backdrop" (click)="onClose()"></div>

<!-- Modal -->
<div class="modal-container">
  <div class="modal-card">

    <div class="modal-header-custom d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-bold mb-0">
        {{ isEdit ? '✏️ Edit Project' : '📁 New Project' }}
      </h5>
      <button class="btn-close-custom" (click)="onClose()">✕</button>
    </div>

    @if (errorMessage) {
      <div class="alert alert-danger">⚠️ {{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()" #projectForm="ngForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">Project Name *</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter project name"
          [(ngModel)]="form.name"
          name="name"
          required
          maxlength="100"/>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Description</label>
        <textarea
          class="form-control"
          placeholder="Optional description"
          [(ngModel)]="form.description"
          name="description"
          rows="3"
          maxlength="500">
        </textarea>
      </div>

      <div class="d-flex gap-2 justify-content-end">
        <button type="button" class="btn btn-light" (click)="onClose()">
          Cancel
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="isLoading || projectForm.invalid">
          @if (isLoading) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          {{ isEdit ? 'Save Changes' : 'Create Project' }}
        </button>
      </div>
    </form>

  </div>
</div>
